<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEDIASCAN — Physical Media Intelligence</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/quagga/0.12.1/quagga.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Bebas+Neue&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0a0c0f;
    --surface: #111418;
    --surface2: #1a1f26;
    --border: #2a3040;
    --accent: #00e5ff;
    --accent2: #ff6b35;
    --accent3: #7cff6b;
    --text: #e8edf5;
    --muted: #5a6478;
    --scan-line: rgba(0, 229, 255, 0.15);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Scanlines overlay */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.03) 2px,
      rgba(0,0,0,0.03) 4px
    );
    pointer-events: none;
    z-index: 9999;
  }

  /* Header */
  header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 1.2rem 2rem;
    border-bottom: 1px solid var(--border);
    background: rgba(10,12,15,0.9);
    backdrop-filter: blur(12px);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .logo {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.8rem;
    letter-spacing: 0.15em;
    color: var(--accent);
    text-shadow: 0 0 20px rgba(0,229,255,0.4);
  }

  .logo span { color: var(--text); }

  .header-status {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.7rem;
    color: var(--muted);
    text-align: right;
    line-height: 1.6;
  }

  .status-dot {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--accent3);
    box-shadow: 0 0 8px var(--accent3);
    animation: pulse 2s infinite;
    margin-right: 5px;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* Main layout */
  .container {
    max-width: 1200px;
    margin: 0 auto;
    padding: 2rem;
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 2rem;
  }

  @media (max-width: 900px) {
    .container { grid-template-columns: 1fr; }
  }

  /* Panel */
  .panel {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    position: relative;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, var(--accent), transparent);
  }

  .panel-header {
    padding: 1rem 1.5rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.75rem;
  }

  .panel-title {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--muted);
  }

  .panel-icon {
    width: 18px; height: 18px;
    color: var(--accent);
  }

  /* Scanner panel */
  #scanner-panel { grid-row: span 1; }

  .scanner-area {
    position: relative;
    background: #000;
    aspect-ratio: 4/3;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #interactive {
    width: 100%;
    height: 100%;
    position: relative;
  }

  #interactive video {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  #interactive canvas {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }

  .scanner-overlay {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  .scan-frame {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    width: 70%; height: 40%;
    border: 2px solid var(--accent);
    box-shadow: 0 0 0 9999px rgba(0,0,0,0.5), 0 0 30px rgba(0,229,255,0.2) inset;
  }

  .scan-frame::before, .scan-frame::after {
    content: '';
    position: absolute;
    width: 20px; height: 20px;
  }

  .scan-frame::before { top: -2px; left: -2px; border-top: 3px solid var(--accent2); border-left: 3px solid var(--accent2); }
  .scan-frame::after { top: -2px; right: -2px; border-top: 3px solid var(--accent2); border-right: 3px solid var(--accent2); }

  .corner-bl, .corner-br {
    position: absolute;
    width: 20px; height: 20px;
    bottom: -2px;
  }
  .corner-bl { left: -2px; border-bottom: 3px solid var(--accent2); border-left: 3px solid var(--accent2); }
  .corner-br { right: -2px; border-bottom: 3px solid var(--accent2); border-right: 3px solid var(--accent2); }

  .scan-line-anim {
    position: absolute;
    left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    box-shadow: 0 0 10px var(--accent);
    animation: scanMove 2s linear infinite;
    top: 0;
  }

  @keyframes scanMove {
    0% { top: 5%; }
    100% { top: 95%; }
  }

  .scanner-idle {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 1rem;
    color: var(--muted);
  }

  .scanner-idle svg {
    width: 60px; height: 60px;
    opacity: 0.3;
  }

  .scanner-idle p {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    letter-spacing: 0.1em;
  }

  /* Scanner controls */
  .scanner-controls {
    padding: 1.2rem 1.5rem;
    display: flex;
    gap: 0.75rem;
    flex-wrap: wrap;
    border-top: 1px solid var(--border);
    background: var(--surface2);
  }

  .btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.12em;
    padding: 0.55rem 1.2rem;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text);
    cursor: pointer;
    border-radius: 2px;
    text-transform: uppercase;
    transition: all 0.15s;
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .btn:hover { border-color: var(--accent); color: var(--accent); }

  .btn-primary {
    background: var(--accent);
    color: #000;
    border-color: var(--accent);
    font-weight: 600;
  }

  .btn-primary:hover { background: #00bcd4; color: #000; border-color: #00bcd4; }

  .btn-danger { border-color: #ff4444; color: #ff4444; }
  .btn-danger:hover { background: rgba(255,68,68,0.1); }

  .btn:disabled { opacity: 0.3; cursor: not-allowed; }

  /* Manual input */
  .manual-input {
    padding: 1rem 1.5rem;
    display: flex;
    gap: 0.5rem;
    border-top: 1px solid var(--border);
  }

  .barcode-input {
    flex: 1;
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.85rem;
    padding: 0.5rem 0.75rem;
    border-radius: 2px;
    outline: none;
    transition: border-color 0.15s;
  }

  .barcode-input:focus { border-color: var(--accent); }
  .barcode-input::placeholder { color: var(--muted); }

  /* Results panel */
  .results-panel {
    display: flex;
    flex-direction: column;
  }

  .result-card {
    padding: 1.5rem;
    flex: 1;
  }

  .no-result {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 200px;
    color: var(--muted);
    gap: 1rem;
  }

  .no-result p {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.1em;
  }

  /* Media result */
  .media-result { display: flex; flex-direction: column; gap: 1.25rem; }

  .media-header {
    display: flex;
    gap: 1.25rem;
    align-items: flex-start;
  }

  .media-cover {
    width: 90px;
    flex-shrink: 0;
    border-radius: 2px;
    overflow: hidden;
    border: 1px solid var(--border);
    background: var(--surface2);
    aspect-ratio: 2/3;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .media-cover img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .cover-placeholder {
    width: 100%;
    height: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 2rem;
    opacity: 0.3;
  }

  .media-title-block { flex: 1; }

  .media-type-badge {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding: 0.2rem 0.5rem;
    border-radius: 2px;
    display: inline-block;
    margin-bottom: 0.5rem;
  }

  .badge-movie { background: rgba(255,107,53,0.15); color: var(--accent2); border: 1px solid rgba(255,107,53,0.3); }
  .badge-music { background: rgba(0,229,255,0.1); color: var(--accent); border: 1px solid rgba(0,229,255,0.2); }
  .badge-book { background: rgba(124,255,107,0.1); color: var(--accent3); border: 1px solid rgba(124,255,107,0.2); }
  .badge-game { background: rgba(180,107,255,0.1); color: #b46bff; border: 1px solid rgba(180,107,255,0.2); }
  .badge-unknown { background: rgba(90,100,120,0.2); color: var(--muted); border: 1px solid var(--border); }

  .media-title {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.5rem;
    letter-spacing: 0.05em;
    line-height: 1.1;
    margin-bottom: 0.3rem;
  }

  .media-subtitle {
    font-size: 0.82rem;
    color: var(--muted);
    font-weight: 300;
  }

  /* Details grid */
  .details-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 0.6rem;
  }

  .detail-item {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 0.6rem 0.75rem;
    border-radius: 2px;
  }

  .detail-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 0.2rem;
  }

  .detail-value {
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text);
  }

  .detail-item.full { grid-column: 1 / -1; }

  /* Rating bar */
  .rating-bar {
    display: flex;
    align-items: center;
    gap: 0.5rem;
  }

  .bar-track {
    flex: 1;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .bar-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
    border-radius: 2px;
    transition: width 0.8s ease;
  }

  .rating-num {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    color: var(--accent);
    min-width: 2.5rem;
  }

  /* Barcode display */
  .barcode-display {
    background: var(--surface2);
    border: 1px solid var(--border);
    padding: 0.75rem;
    border-radius: 2px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .barcode-num {
    color: var(--accent);
    letter-spacing: 0.15em;
  }

  /* Loading state */
  .loading-state {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 2rem 0;
  }

  .spinner {
    width: 24px; height: 24px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    flex-shrink: 0;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.75rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* History panel */
  .history-panel {
    grid-column: 1 / -1;
  }

  .history-list {
    padding: 0;
  }

  .history-item {
    display: flex;
    align-items: center;
    gap: 1rem;
    padding: 0.85rem 1.5rem;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    transition: background 0.15s;
  }

  .history-item:hover { background: var(--surface2); }
  .history-item:last-child { border-bottom: none; }

  .history-type-icon {
    font-size: 1.2rem;
    width: 2rem;
    text-align: center;
  }

  .history-info { flex: 1; }

  .history-name {
    font-size: 0.85rem;
    font-weight: 500;
    margin-bottom: 0.1rem;
  }

  .history-meta {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.62rem;
    color: var(--muted);
    letter-spacing: 0.08em;
  }

  .history-barcode {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.65rem;
    color: var(--muted);
  }

  .history-empty {
    padding: 2rem;
    text-align: center;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    color: var(--muted);
    letter-spacing: 0.1em;
  }

  /* Toast */
  .toast {
    position: fixed;
    bottom: 2rem;
    right: 2rem;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-left: 3px solid var(--accent);
    padding: 0.85rem 1.25rem;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    letter-spacing: 0.08em;
    color: var(--text);
    border-radius: 2px;
    z-index: 9998;
    transform: translateY(20px);
    opacity: 0;
    transition: all 0.25s;
    max-width: 300px;
  }

  .toast.show { transform: translateY(0); opacity: 1; }
  .toast.error { border-left-color: #ff4444; }
  .toast.success { border-left-color: var(--accent3); }

  /* Error state */
  .error-state {
    padding: 1.5rem;
    background: rgba(255,68,68,0.05);
    border: 1px solid rgba(255,68,68,0.2);
    border-radius: 2px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.72rem;
    color: #ff6666;
    letter-spacing: 0.08em;
  }

  /* Animations */
  .result-in {
    animation: resultIn 0.3s ease forwards;
  }

  @keyframes resultIn {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Stats bar */
  .stats-bar {
    grid-column: 1 / -1;
    display: flex;
    gap: 1px;
    background: var(--border);
    border: 1px solid var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .stat-cell {
    flex: 1;
    background: var(--surface);
    padding: 0.85rem 1.25rem;
    display: flex;
    flex-direction: column;
    gap: 0.2rem;
  }

  .stat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 0.6rem;
    letter-spacing: 0.12em;
    color: var(--muted);
    text-transform: uppercase;
  }

  .stat-value {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 1.6rem;
    color: var(--accent);
    line-height: 1;
  }
</style>
</head>
<body>

<header>
  <div class="logo">MEDIA<span>SCAN</span></div>
  <div class="header-status">
    <div><span class="status-dot"></span>SYSTEM ONLINE</div>
    <div id="datetime" style="color: var(--accent); margin-top:2px;"></div>
  </div>
</header>

<div class="container">

  <!-- Stats bar -->
  <div class="stats-bar">
    <div class="stat-cell">
      <div class="stat-label">Total Scanned</div>
      <div class="stat-value" id="stat-total">0</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Movies</div>
      <div class="stat-value" id="stat-movies">0</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Music</div>
      <div class="stat-value" id="stat-music">0</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Books</div>
      <div class="stat-value" id="stat-books">0</div>
    </div>
    <div class="stat-cell">
      <div class="stat-label">Games</div>
      <div class="stat-value" id="stat-games">0</div>
    </div>
  </div>

  <!-- Scanner Panel -->
  <div class="panel" id="scanner-panel">
    <div class="panel-header">
      <svg class="panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <rect x="3" y="3" width="18" height="18" rx="2"/>
        <path d="M7 7h2v10H7zM11 7h1v10h-1zM14 7h1v10h-1zM17 7h-1v10h1z"/>
      </svg>
      <span class="panel-title">Barcode Scanner</span>
    </div>

    <div class="scanner-area" id="scanner-area">
      <div id="interactive"></div>
      <div class="scanner-overlay" id="scanner-overlay" style="display:none;">
        <div class="scan-frame">
          <div class="corner-bl"></div>
          <div class="corner-br"></div>
          <div class="scan-line-anim"></div>
        </div>
      </div>
      <div class="scanner-idle" id="scanner-idle">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path d="M3 9V5a2 2 0 012-2h4M3 15v4a2 2 0 002 2h4M21 9V5a2 2 0 00-2-2h-4M21 15v4a2 2 0 01-2 2h-4"/>
          <line x1="7" y1="12" x2="17" y2="12"/>
        </svg>
        <p>CAMERA INACTIVE</p>
        <p style="font-size:0.62rem; opacity:0.5;">Press START to activate scanner</p>
      </div>
    </div>

    <div class="scanner-controls">
      <button class="btn btn-primary" id="btn-start" onclick="startScanner()">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><polygon points="5,3 19,12 5,21"/></svg>
        START SCAN
      </button>
      <button class="btn btn-danger" id="btn-stop" onclick="stopScanner()" disabled>
        <svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><rect x="3" y="3" width="18" height="18"/></svg>
        STOP
      </button>
      <button class="btn" onclick="clearResults()">CLEAR</button>
    </div>

    <div class="manual-input">
      <input type="text" class="barcode-input" id="manual-barcode" placeholder="Enter barcode manually (ISBN, UPC, EAN)..." maxlength="30">
      <button class="btn btn-primary" onclick="lookupManual()">LOOKUP</button>
    </div>
  </div>

  <!-- Results Panel -->
  <div class="panel results-panel" id="results-panel">
    <div class="panel-header">
      <svg class="panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/>
        <polyline points="14,2 14,8 20,8"/>
        <line x1="16" y1="13" x2="8" y2="13"/>
        <line x1="16" y1="17" x2="8" y2="17"/>
        <polyline points="10,9 9,9 8,9"/>
      </svg>
      <span class="panel-title">Media Intelligence Report</span>
    </div>

    <div class="result-card" id="result-card">
      <div class="no-result" id="no-result">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" opacity="0.2">
          <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35M11 8v6M8 11h6"/>
        </svg>
        <p>AWAITING SCAN INPUT</p>
        <p style="font-size:0.62rem; opacity:0.5;">Scan a barcode or enter manually</p>
      </div>
      <div id="result-display" style="display:none;"></div>
    </div>
  </div>

  <!-- History Panel -->
  <div class="panel history-panel">
    <div class="panel-header" style="justify-content: space-between;">
      <div style="display:flex; align-items:center; gap:0.75rem;">
        <svg class="panel-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="12,8 12,12 14,14"/>
          <path d="M3.05 11a9 9 0 119 9.95"/>
          <path d="M3 3v5h5"/>
        </svg>
        <span class="panel-title">Scan History</span>
      </div>
      <button class="btn" style="font-size:0.62rem; padding:0.35rem 0.75rem;" onclick="clearHistory()">CLEAR HISTORY</button>
    </div>
    <div class="history-list" id="history-list">
      <div class="history-empty" id="history-empty">NO SCANS RECORDED</div>
    </div>
  </div>

</div>

<!-- Toast -->
<div class="toast" id="toast"></div>

<script>
let scannerRunning = false;
let lastScanned = '';
let scanHistory = JSON.parse(localStorage.getItem('mediascan_history') || '[]');
let stats = JSON.parse(localStorage.getItem('mediascan_stats') || '{"total":0,"movies":0,"music":0,"books":0,"games":0}');

// DateTime
function updateClock() {
  const now = new Date();
  document.getElementById('datetime').textContent =
    now.toLocaleDateString('en-US', {year:'2-digit',month:'2-digit',day:'2-digit'}) +
    ' ' + now.toLocaleTimeString('en-US', {hour12:false});
}
setInterval(updateClock, 1000);
updateClock();

// Render history on load
renderHistory();
updateStats();

// ── Scanner ──────────────────────────────────────────────────────────

function startScanner() {
  document.getElementById('scanner-idle').style.display = 'none';
  document.getElementById('scanner-overlay').style.display = 'block';
  document.getElementById('btn-start').disabled = true;
  document.getElementById('btn-stop').disabled = false;

  Quagga.init({
    inputStream: {
      name: 'Live',
      type: 'LiveStream',
      target: document.querySelector('#interactive'),
      constraints: { facingMode: 'environment', width: { ideal: 1280 }, height: { ideal: 720 } },
    },
    decoder: {
      readers: ['ean_reader', 'ean_8_reader', 'upc_reader', 'upc_e_reader', 'code_128_reader', 'code_39_reader', 'i2of5_reader'],
    },
    locate: true,
    locator: { patchSize: 'medium', halfSample: true },
  }, function(err) {
    if (err) {
      showToast('Camera error: ' + err.message, 'error');
      stopScanner();
      return;
    }
    Quagga.start();
    scannerRunning = true;
  });

  Quagga.onDetected(function(result) {
    const code = result.codeResult.code;
    if (code && code !== lastScanned) {
      lastScanned = code;
      onBarcodeDetected(code);
      setTimeout(() => { lastScanned = ''; }, 3000);
    }
  });
}

function stopScanner() {
  if (scannerRunning) {
    Quagga.stop();
    scannerRunning = false;
  }
  document.getElementById('scanner-idle').style.display = 'flex';
  document.getElementById('scanner-overlay').style.display = 'none';
  document.getElementById('btn-start').disabled = false;
  document.getElementById('btn-stop').disabled = true;
}

function lookupManual() {
  const val = document.getElementById('manual-barcode').value.trim();
  if (!val) { showToast('Please enter a barcode', 'error'); return; }
  onBarcodeDetected(val);
  document.getElementById('manual-barcode').value = '';
}

document.getElementById('manual-barcode').addEventListener('keydown', e => {
  if (e.key === 'Enter') lookupManual();
});

// ── Barcode Detection ─────────────────────────────────────────────────

function onBarcodeDetected(code) {
  showToast('Barcode detected: ' + code);
  showLoading();
  lookupBarcode(code);
}

// ── API Lookup ────────────────────────────────────────────────────────

async function lookupBarcode(barcode) {
  barcode = barcode.trim();

  // Determine type by length/prefix
  const isISBN = /^97[89]/.test(barcode) || (barcode.length === 10 || barcode.length === 13) && /^\d+$/.test(barcode);
  const isUPC  = barcode.length === 12;

  let result = null;

  // Try Open Library (books)
  if (isISBN || barcode.length === 13) {
    result = await tryOpenLibrary(barcode);
  }

  // Try MusicBrainz via barcode
  if (!result) {
    result = await tryMusicBrainz(barcode);
  }

  // Try UPC Item DB (movies/misc)
  if (!result) {
    result = await tryUPCItemDB(barcode);
  }

  // Fallback: Try Open Library without type check
  if (!result && !isISBN) {
    result = await tryOpenLibrary(barcode);
  }

  if (result) {
    displayResult(result, barcode);
    addToHistory(result, barcode);
  } else {
    displayNotFound(barcode);
  }
}

async function tryOpenLibrary(barcode) {
  try {
    const url = `https://openlibrary.org/api/books?bibkeys=ISBN:${barcode}&format=json&jscmd=data`;
    const res = await fetch(url);
    const data = await res.json();
    const key = `ISBN:${barcode}`;
    if (!data[key]) return null;

    const book = data[key];
    const authors = book.authors ? book.authors.map(a => a.name).join(', ') : 'Unknown';
    const cover = book.cover ? (book.cover.medium || book.cover.small || null) : null;
    const subjects = book.subjects ? book.subjects.slice(0,4).map(s => s.name||s).join(', ') : '';
    const publisher = book.publishers ? book.publishers.map(p=>p.name).join(', ') : 'Unknown';

    return {
      type: 'book',
      title: book.title || 'Unknown Title',
      subtitle: authors,
      year: book.publish_date || 'Unknown',
      cover: cover,
      details: [
        { label: 'Author(s)', value: authors },
        { label: 'Publisher', value: publisher },
        { label: 'Published', value: book.publish_date || 'Unknown' },
        { label: 'Pages', value: book.number_of_pages ? book.number_of_pages + ' pages' : 'N/A' },
        { label: 'Language', value: book.languages ? book.languages.map(l=>l.name||l.key).join(', ') : 'English' },
        { label: 'ISBN', value: barcode },
        subjects ? { label: 'Subjects', value: subjects, full: true } : null,
        book.url ? { label: 'Open Library', value: '<a href="'+book.url+'" target="_blank" style="color:var(--accent)">View Record ↗</a>', full: true } : null,
      ].filter(Boolean),
      rating: null,
    };
  } catch(e) { return null; }
}

async function tryMusicBrainz(barcode) {
  try {
    const url = `https://musicbrainz.org/ws/2/release/?query=barcode:${barcode}&fmt=json&limit=1`;
    const res = await fetch(url, { headers: { 'User-Agent': 'MediaScanApp/1.0 (example@example.com)' } });
    const data = await res.json();
    if (!data.releases || data.releases.length === 0) return null;

    const r = data.releases[0];
    const artist = r['artist-credit'] ? r['artist-credit'].map(a => a.name || (a.artist && a.artist.name)).filter(Boolean).join(', ') : 'Unknown Artist';
    const label = r['label-info'] ? r['label-info'].map(l => l.label && l.label.name).filter(Boolean).join(', ') : 'Unknown Label';

    return {
      type: 'music',
      title: r.title || 'Unknown Title',
      subtitle: artist,
      year: r.date ? r.date.substring(0,4) : 'Unknown',
      cover: null,
      details: [
        { label: 'Artist', value: artist },
        { label: 'Label', value: label || 'Unknown' },
        { label: 'Year', value: r.date ? r.date.substring(0,4) : 'Unknown' },
        { label: 'Country', value: r.country || 'Unknown' },
        { label: 'Format', value: r.media ? r.media.map(m=>m.format).filter(Boolean).join(', ') : 'Unknown' },
        { label: 'Tracks', value: r.media ? r.media.reduce((sum,m) => sum + (m['track-count']||0), 0) + ' tracks' : 'N/A' },
        { label: 'Status', value: r.status || 'Unknown' },
        { label: 'Barcode', value: barcode },
      ],
      rating: null,
      mbid: r.id,
    };
  } catch(e) { return null; }
}

async function tryUPCItemDB(barcode) {
  try {
    const res = await fetch(`https://api.upcitemdb.com/prod/trial/lookup?upc=${barcode}`);
    const data = await res.json();
    if (!data.items || data.items.length === 0) return null;

    const item = data.items[0];
    const category = (item.category || '').toLowerCase();

    let type = 'unknown';
    if (/movie|film|blu|dvd|video/.test(category) || /movie|film|blu|dvd/.test((item.title||'').toLowerCase())) type = 'movie';
    else if (/music|cd|vinyl|album/.test(category)) type = 'music';
    else if (/game|xbox|playstation|nintendo|pc game/.test(category)) type = 'game';
    else if (/book/.test(category)) type = 'book';

    return {
      type: type,
      title: item.title || 'Unknown Product',
      subtitle: item.brand || item.category || '',
      year: item.creation_time ? new Date(item.creation_time*1000).getFullYear().toString() : 'Unknown',
      cover: item.images && item.images.length ? item.images[0] : null,
      details: [
        item.brand ? { label: 'Brand', value: item.brand } : null,
        item.category ? { label: 'Category', value: item.category } : null,
        item.color ? { label: 'Color', value: item.color } : null,
        item.size ? { label: 'Size', value: item.size } : null,
        item.weight ? { label: 'Weight', value: item.weight } : null,
        { label: 'UPC', value: barcode },
        item.description ? { label: 'Description', value: item.description, full: true } : null,
      ].filter(Boolean),
      rating: null,
    };
  } catch(e) { return null; }
}

// ── Display ───────────────────────────────────────────────────────────

function showLoading() {
  document.getElementById('no-result').style.display = 'none';
  document.getElementById('result-display').style.display = 'block';
  document.getElementById('result-display').innerHTML = `
    <div class="loading-state">
      <div class="spinner"></div>
      <div class="loading-text">QUERYING DATABASES...<br><span style="opacity:0.5; font-size:0.65rem;">Open Library · MusicBrainz · UPCItemDB</span></div>
    </div>`;
}

function displayResult(result, barcode) {
  const typeLabels = { movie: 'FILM', music: 'MUSIC', book: 'BOOK', game: 'GAME', unknown: 'ITEM' };
  const typeEmojis = { movie: '🎬', music: '🎵', book: '📖', game: '🎮', unknown: '📦' };
  const badgeClass = { movie:'badge-movie', music:'badge-music', book:'badge-book', game:'badge-game', unknown:'badge-unknown' };

  let coverHtml = result.cover
    ? `<img src="${result.cover}" alt="cover" onerror="this.parentNode.innerHTML='<div class=cover-placeholder>${typeEmojis[result.type]}</div>'">`
    : `<div class="cover-placeholder">${typeEmojis[result.type]}</div>`;

  let detailsHtml = result.details.map(d =>
    `<div class="detail-item${d.full?' full':''}">
      <div class="detail-label">${d.label}</div>
      <div class="detail-value">${d.value}</div>
    </div>`
  ).join('');

  if (result.rating) {
    detailsHtml += `<div class="detail-item full">
      <div class="detail-label">Rating</div>
      <div class="rating-bar">
        <div class="bar-track"><div class="bar-fill" style="width:${result.rating*10}%"></div></div>
        <span class="rating-num">${result.rating}/10</span>
      </div>
    </div>`;
  }

  document.getElementById('result-display').innerHTML = `
    <div class="media-result result-in">
      <div class="media-header">
        <div class="media-cover">${coverHtml}</div>
        <div class="media-title-block">
          <span class="media-type-badge ${badgeClass[result.type]}">${typeLabels[result.type]}</span>
          <div class="media-title">${escHtml(result.title)}</div>
          <div class="media-subtitle">${escHtml(result.subtitle)}</div>
        </div>
      </div>
      <div class="details-grid">${detailsHtml}</div>
      <div class="barcode-display">
        <span style="color:var(--muted); font-size:0.62rem; letter-spacing:0.1em;">BARCODE</span>
        <span class="barcode-num">${barcode}</span>
      </div>
    </div>`;
  document.getElementById('no-result').style.display = 'none';
}

function displayNotFound(barcode) {
  document.getElementById('result-display').innerHTML = `
    <div class="error-state result-in">
      ⚠ NO RECORD FOUND<br>
      <span style="opacity:0.6; font-size:0.65rem; display:block; margin-top:0.5rem;">Barcode: ${barcode}</span>
      <span style="opacity:0.5; font-size:0.62rem; display:block; margin-top:0.3rem;">
        Try manual entry or verify the barcode format (ISBN-13, EAN-13, UPC-A)
      </span>
    </div>`;
}

function clearResults() {
  document.getElementById('no-result').style.display = 'flex';
  document.getElementById('result-display').style.display = 'none';
  document.getElementById('result-display').innerHTML = '';
}

// ── History ───────────────────────────────────────────────────────────

const typeEmojis = { movie:'🎬', music:'🎵', book:'📖', game:'🎮', unknown:'📦' };

function addToHistory(result, barcode) {
  const entry = {
    id: Date.now(),
    type: result.type,
    title: result.title,
    subtitle: result.subtitle,
    barcode: barcode,
    year: result.year,
    scannedAt: new Date().toLocaleString(),
    fullResult: result,
  };

  scanHistory.unshift(entry);
  if (scanHistory.length > 50) scanHistory.pop();
  localStorage.setItem('mediascan_history', JSON.stringify(scanHistory));

  stats.total++;
  if (result.type === 'movie') stats.movies++;
  else if (result.type === 'music') stats.music++;
  else if (result.type === 'book') stats.books++;
  else if (result.type === 'game') stats.games++;
  localStorage.setItem('mediascan_stats', JSON.stringify(stats));

  updateStats();
  renderHistory();
}

function renderHistory() {
  const list = document.getElementById('history-list');
  const empty = document.getElementById('history-empty');

  if (scanHistory.length === 0) {
    empty.style.display = 'block';
    list.querySelectorAll('.history-item').forEach(el => el.remove());
    return;
  }

  empty.style.display = 'none';
  list.querySelectorAll('.history-item').forEach(el => el.remove());

  scanHistory.forEach(entry => {
    const div = document.createElement('div');
    div.className = 'history-item';
    div.innerHTML = `
      <div class="history-type-icon">${typeEmojis[entry.type] || '📦'}</div>
      <div class="history-info">
        <div class="history-name">${escHtml(entry.title)}</div>
        <div class="history-meta">${escHtml(entry.subtitle)} · ${entry.year || ''}</div>
      </div>
      <div style="text-align:right;">
        <div class="history-barcode">${entry.barcode}</div>
        <div style="font-size:0.58rem; color:var(--muted); margin-top:0.2rem; font-family:'Share Tech Mono',monospace;">${entry.scannedAt}</div>
      </div>`;
    div.onclick = () => displayResult(entry.fullResult, entry.barcode);
    list.appendChild(div);
  });
}

function clearHistory() {
  if (confirm('Clear all scan history?')) {
    scanHistory = [];
    stats = { total:0, movies:0, music:0, books:0, games:0 };
    localStorage.setItem('mediascan_history', '[]');
    localStorage.setItem('mediascan_stats', JSON.stringify(stats));
    renderHistory();
    updateStats();
    showToast('History cleared');
  }
}

function updateStats() {
  document.getElementById('stat-total').textContent = stats.total;
  document.getElementById('stat-movies').textContent = stats.movies;
  document.getElementById('stat-music').textContent = stats.music;
  document.getElementById('stat-books').textContent = stats.books;
  document.getElementById('stat-games').textContent = stats.games;
}

// ── Utilities ─────────────────────────────────────────────────────────

function escHtml(str) {
  return (str || '').toString().replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

let toastTimer;
function showToast(msg, type = '') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show' + (type ? ' ' + type : '');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { t.classList.remove('show'); }, 3000);
}
</script>
